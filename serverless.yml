service: admin-mcp
frameworkVersion: "4"

provider:
  name: aws
  runtime: python3.12
  # region: us-east-1
  timeout: 30
  memorySize: 512
  deploymentBucket:
    name: admin-mcp-serverless-deployments-${sls:stage}
  environment:
    ADMIN_API_TIMEOUT: "30"
    CART_STORE_BACKEND: dynamodb
    DYNAMODB_CART_TABLE: ${self:service}-cart-${sls:stage}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:DeleteItem
          Resource:
            - Fn::GetAtt: [CartTable, Arn]

functions:
  mcp:
    handler: app/lambda_handler.handler
    url: true

resources:
  Resources:
    CartTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-cart-${sls:stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: backend
            AttributeType: S
          - AttributeName: token
            AttributeType: S
        KeySchema:
          - AttributeName: backend
            KeyType: HASH
          - AttributeName: token
            KeyType: RANGE

custom:
  pythonRequirements:
    useUv: true
    installer: uv
    uvOptionalDependencies:
      - lambda
    dockerizePip: non-linux
    slim: true
    slimPatternsAppendDefaults: false
    slimPatterns:
      - "**/*.py[c|o]"
      - "**/__pycache__*"
    noDeploy:
      - cryptography
      - authlib
      - joserfc
      - cffi
      - pycparser
      - cyclopts
      - docutils
      - keyring
      - secretstorage
      - jeepney
      - jaraco.classes
      - jaraco.context
      - jaraco.functools
      - pyperclip
      - dnspython
      - email-validator

package:
  patterns:
    - '!./**'
    - app/**
